name: CI for windows by xmake

on:
  push:
    branches: [ "*" ]
    paths-ignore:
      - '**/*.md'
      - 'docs/*'
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        kind: [shared, static]
        mode: [debug, release]
        toolchain: [msvc, clang-cl, mingw]

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC environment
        if: matrix.toolchain != 'mingw'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup xmake for MSVC/clang-cl
        if: matrix.toolchain != 'mingw'
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Setup MSYS2 for MinGW
        if: matrix.toolchain == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: minimal
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-xmake
            git

      - name: Configure MinGW
        if: matrix.toolchain == 'mingw'
        shell: msys2 {0}
        run: |
          which xmake
          which gcc
          which g++
          which ar
          which ranlib
          gcc -dumpmachine

          xmake f -c \
            -p mingw -a x64 \
            -m ${{ matrix.mode }} \
            -k ${{ matrix.kind }} \
            --dev=y -y

      - name: Configure MSVC/clang-cl
        if: matrix.toolchain != 'mingw'
        shell: pwsh
        run: |
          xmake f -c -m ${{ matrix.mode }} -k ${{ matrix.kind }} --toolchain=${{ matrix.toolchain }} --dev=y -y

      - name: Build MinGW
        if: matrix.toolchain == 'mingw'
        shell: msys2 {0}
        run: xmake -vD -y

      - name: Build MSVC/clang-cl
        if: matrix.toolchain != 'mingw'
        run: xmake -vD -y

      - name: Test MinGW
        if: matrix.toolchain == 'mingw'
        shell: msys2 {0}
        run: xmake test -vD

      - name: Test MSVC/clang-cl
        if: matrix.toolchain != 'mingw'
        run: xmake test -vD