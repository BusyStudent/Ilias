name: Release

permissions:
  contents: write

on:
  # Tag created from the GitHub UI triggers `create` reliably.
  # It also fires when a new tag is created via `git push`.
  create:
  workflow_dispatch:

jobs:
  release:
    # Only run for tags (and only for tags we consider release-like).
    if: |
      (github.event_name == 'create' && github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - name: Determine Tag Ref
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "create" ]; then
            TAG="${{ github.event.ref }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.ref }}
          fetch-depth: 0

      - name: Create Source Archives
        shell: bash
        run: |
          set -euo pipefail

          REPO="${{ github.event.repository.name }}"
          TAG="${{ steps.vars.outputs.tag }}"
          BASENAME="${REPO}-${TAG}"

          # Produce deterministic source archives from the tag, instead of relying on
          # GitHub's auto-generated "Source code" links (not release assets).
          git archive --format=tar --prefix="${BASENAME}/" HEAD | gzip -9 > "${BASENAME}.tar.gz"
          git archive --format=zip --prefix="${BASENAME}/" HEAD > "${BASENAME}.zip"

          sha256sum "${BASENAME}.tar.gz" > "${BASENAME}.tar.gz.sha256"
          sha256sum "${BASENAME}.zip" > "${BASENAME}.zip.sha256"

          ls -lah "${BASENAME}.tar.gz" "${BASENAME}.zip" "${BASENAME}.tar.gz.sha256" "${BASENAME}.zip.sha256"

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
            *.sha256
