<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Console</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --text: #d4d4d4;
            --border: #444;
            --hover: #2a2d2e;
            --header-bg: #252526;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            padding: 0;
            font-size: 14px;
        }
        .toolbar {
            position: sticky;
            top: 0;
            background: var(--header-bg);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
            border-radius: 3px;
        }
        button:hover { background: #005f9e; }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        th {
            position: sticky;
            top: 45px; /* offset for toolbar */
            background: var(--header-bg);
            cursor: pointer;
            user-select: none;
            z-index: 9;
        }
        th:hover { background: var(--hover); }
        tr:hover td { background: var(--hover); }
        
        /* State Color */
        .state-Running { color: #4CAF50; font-weight: bold; }
        .state-Idle { color: #9E9E9E; }
        .state-Yielded { color: #FFC107; }
        .state-Completed { color: #2196F3; }
        
        /* ProgressBar color */
        .bar-container { width: 100px; background: #333; height: 6px; border-radius: 3px; display: inline-block; vertical-align: middle; margin-left: 8px; }
        .bar-fill { height: 100%; background: #4CAF50; border-radius: 3px; }

        /* Location */
        .cell-location {
            max-width: 200px; /* Hidden if too long */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #9cdcfe;
        }

        /* Row */
        .clickable-row {
            cursor: pointer;
        }
        .expand-icon {
            display: inline-block;
            width: 16px;
            transition: transform 0.2s;
            font-size: 12px;
            color: #888;
        }
        .expanded .expand-icon {
            transform: rotate(90deg);
        }
        
        /* Stacktrace */
        .stack-row { background-color: #252526; }
        .stack-row:hover td { background-color: #252526 !important; }
        .stack-container {
            margin: 0;
            padding: 5px 15px;
            background: #1e1e1e;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            white-space: normal; 
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.4;
        }

        /*  Single frame */
        .st-frame {
            padding: 8px 0;
            border-bottom: 1px solid #333; 
        }
        .st-frame:last-child {
            border-bottom: none;
        }

        .st-header {
            display: flex;
            align-items: baseline; 
            margin-bottom: 4px;
        }

        /* #1 */
        .st-frame-index {
            color: #888888;
            font-weight: bold;
            margin-right: 12px;
            min-width: 25px; 
        }

        /* at */
        .st-keyword {
            color: #888888;
            margin-right: 5px;
        }

        /* function name */
        .st-func {
            color: #dcdcaa;
            word-break: break-all;
        }

        /* Source location (at file:line) */
        .st-location {
            padding-left: 37px;
            font-size: 12px;
        }
        .st-file { color: #9cdcfe; }
        .st-line { color: #b5cea8; }

        .st-message {
            margin-left: 10px;
            color: #ce9178;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div>
            <strong>⚡ Async Task Console</strong>
            <span id="stats" style="margin-left: 20px; color: #888;">Tasks: 0 | Running: 0</span>
        </div>
        <div>
            <button id="pauseBtn" onclick="togglePause()">Pause</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th onclick="setSort('id')">ID <span id="sort-id"></span></th>
                <th onclick="setSort('name')">Task Name <span id="sort-name"></span></th>
                <th onclick="setSort('location')">Location <span id="sort-location"></span></th>
                <th onclick="setSort('state')">State <span id="sort-state"></span></th>
                <th onclick="setSort('total_time')">Total Time <span id="sort-total_time"></span></th>
                <th onclick="setSort('busy_time')">Busy Time <span id="sort-busy_time"></span></th>
                <th onclick="setSort('resumes')">Polls <span id="sort-resumes"></span></th>
            </tr>
        </thead>
        <tbody id="task-body">
            <!-- Data will be injected here -->
        </tbody>
    </table>

    <script>
        // State
        let tasks = [];
        let isPaused = false;
        let sortKey = 'id';
        let sortAsc = true;
        let updateInterval = null;

        // State for stacktrace
        let expandedTasks = new Set();
        let stackTraces = {};

        async function fetchTasks() {
            if (isPaused) return;

            try {
                // [
                //     {
                //         "id": 0,
                //         "name": "Task 1",
                //         "state": "Running or Idle or Yielded or Completed",
                //         "total_time": 1234,
                //         "busy_time": 1000,
                //         "resumes": 5,
                //         "location": "main.cpp:114514"
                //     },
                // ]
                const response = await fetch('/api/tasks');
                const data = await response.json();

                tasks = data;
                render();
            }
            catch (error) {
                console.error("Failed to fetch tasks:", error);
            }
        }

        function escapeHtml(unsafe) {
            if (unsafe === undefined || unsafe === null) return '';
            return unsafe.toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function cleanCppSignature(signature) {
            if (!signature) return '';
            let str = signature.trim();

            // Remove return type
            str = str.replace(/(?:\s+(?:const|volatile|&|&&|noexcept))+$/g, '').trim();

            // Split parameters
            let paramStart = -1;
            let pDepth = 0;
            if (str.endsWith(')')) {
                for (let i = str.length - 1; i >= 0; i--) {
                    if (str[i] === ')') pDepth++;
                    else if (str[i] === '(') {
                        pDepth--;
                        if (pDepth === 0) {
                            paramStart = i;
                            break;
                        }
                    }
                }
            }
            
            // Left [return type] [call] function<template>
            if (paramStart !== -1) {
                str = str.substring(0, paramStart).trim();
            }

            // Remove calling convention if any
            const ccRegex = /\b__(cdecl|stdcall|thiscall|fastcall|vectorcall|clrcall|pascal)\b/g;
            let match;
            let lastCcIndex = -1;
            let lastCcLength = 0;
            while ((match = ccRegex.exec(str)) !== null) {
                lastCcIndex = match.index;
                lastCcLength = match[0].length;
            }

            if (lastCcIndex !== -1) {
                return str.substring(lastCcIndex + lastCcLength).trim();
            }

            // Fallback
            let angleDepth = 0;
            let parenDepth = 0;
            for (let i = str.length - 1; i >= 0; i--) {
                let char = str[i];
                if (char === '>') angleDepth++;
                else if (char === '<') angleDepth--;
                else if (char === ')') parenDepth++;
                else if (char === '(') parenDepth--;
                else if (char === ' ' && angleDepth === 0 && parenDepth === 0) {
                    let leftPart = str.substring(0, i).trimEnd();
                    if (leftPart.endsWith('operator')) {
                        continue; 
                    }
                    str = str.substring(i + 1).trim();
                    break;
                }
            }

            return str;
        }

        async function toggleStackTrace(id) {
            if (expandedTasks.has(id)) {
                expandedTasks.delete(id);
                render();
                return;
            }
            expandedTasks.add(id);
            
            stackTraces[id] = '<div style="color:#888;">Loading stacktrace...</div>';
            render();

            try {
                const response = await fetch(`/api/stacktrace/${id}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                
                if (Array.isArray(data) && data.length > 0) {
                    let htmlStr = '';
                    data.forEach((frame, index) => {
                        const cleanFunc = cleanCppSignature(frame.function);
                        const func = escapeHtml(cleanFunc);
                        const file = escapeHtml(frame.file || 'unknown_file');
                        const line = escapeHtml(frame.line || '0');
                        const message = frame.message ? escapeHtml(frame.message) : '';

                        htmlStr += `
                            <div class="st-frame">
                                <div class="st-header">
                                    <span class="st-frame-index">#${index}</span>
                                    <span class="st-func">${func}</span>
                                </div>
                                <div class="st-location">
                                    <span class="st-keyword">at</span>
                                    <span class="st-file">${file}</span>:<span class="st-line">${line}</span>
                                    ${message ? `<span class="st-message">[${message}]</span>` : ''}
                                </div>
                            </div>
                        `;
                    });
                    stackTraces[id] = htmlStr;
                }
                else {
                    stackTraces[id] = '<div style="color:#888;">No stacktrace available.</div>';
                }
            }
            catch (error) {
                console.error(`Failed to fetch stacktrace for task ${id}:`, error);
                stackTraces[id] = '<div style="color: #f48771;">Error: Failed to load stacktrace.</div>';
            }
            
            if (expandedTasks.has(id)) {
                render();
            }
        }

        // Render
        function formatTime(ms) {
            if (ms < 1) return ms.toFixed(2) + 'ms';
            if (ms < 1000) return ms.toFixed(0) + 'ms';
            return (ms / 1000).toFixed(2) + 's';
        }

        function render() {
            const sortedTasks = [...tasks].sort((a, b) => {
                let valA = a[sortKey];
                let valB = b[sortKey];
                if (typeof valA === 'string') {
                    return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
                }
                return sortAsc ? valA - valB : valB - valA;
            });

            const tbody = document.getElementById('task-body');
            tbody.innerHTML = '';

            let runningCount = 0;

            sortedTasks.forEach(t => {
                if (t.state === 'Running') runningCount++;
                
                const busyRatio = Math.min((t.busy_time / t.total_time) * 100, 100) || 0;
                const isExpanded = expandedTasks.has(t.id);
                
                const tr = document.createElement('tr');
                tr.className = 'clickable-row' + (isExpanded ? ' expanded' : '');
                tr.onclick = () => toggleStackTrace(t.id); // Bind to show stacktrace
                
                tr.innerHTML = `
                    <td><span class="expand-icon">▶</span> ${t.id}</td>
                    <td>${t.name}</td>
                    <td class="cell-location" title="${t.location || ''}">${t.location || '-'}</td>
                    <td class="state-${t.state}">${t.state}</td>
                    <td>${formatTime(t.total_time)}</td>
                    <td>
                        ${formatTime(t.busy_time)}
                        <div class="bar-container"><div class="bar-fill" style="width: ${busyRatio}%"></div></div>
                    </td>
                    <td>${t.resumes}</td>
                `;
                tbody.appendChild(tr);

                if (isExpanded) {
                    const stackTr = document.createElement('tr');
                    stackTr.className = 'stack-row';
                    stackTr.innerHTML = `
                        <td colspan="7" style="padding: 10px 20px;">
                            <pre class="stack-container">${stackTraces[t.id]}</pre>
                        </td>
                    `;
                    tbody.appendChild(stackTr);
                }
            });

            // Update state
            document.getElementById('stats').innerText = `Tasks: ${tasks.length} | Running: ${runningCount}`;
            
            // Sort indicators
            document.querySelectorAll('th span').forEach(el => el.innerText = '');
            document.getElementById(`sort-${sortKey}`).innerText = sortAsc ? ' ▲' : ' ▼';
        }

        function setSort(key) {
            if (sortKey === key) {
                sortAsc = !sortAsc;
            }
            else {
                sortKey = key;
                sortAsc = true;
            }
            render();
        }

        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('pauseBtn');
            btn.innerText = isPaused ? 'Resume' : 'Pause';
            btn.style.background = isPaused ? '#e51400' : '#007acc';
            if (!isPaused) fetchTasks();
        }

        // Start it
        fetchTasks();
        updateInterval = setInterval(fetchTasks, 1000);
    </script>
</body>
</html>
